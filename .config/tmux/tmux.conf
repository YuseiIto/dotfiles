# Copy mode key bindings - - - - - 
bind Space copy-mode
bind p paste-buffer

# Copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection 

# Vim-like Pane switching
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Resize pane like vim
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# true color
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",$TERM:Tc"

setw -g mouse on

# Show [!] + orange background on windows where Claude Code is waiting for
# input. Raised by Claude Code Notification hook → ~/.claude/claude-tmux-notify;
# cleared by the focus / select-window hooks below the moment the user looks.
set -g focus-events on
set-hook -g pane-focus-in       'set-option -uw @claude_notif'
set-hook -g after-select-window 'set-option -uw @claude_notif'
set -g window-status-format         "#[bg=#{?@claude_notif,colour214,default}]#[fg=#{?@claude_notif,black,default}] #I:#W#{?window_flags,#{window_flags}, }#{?@claude_notif,[!] ,}#[default]"
set -g window-status-current-format "#[bg=#{?@claude_notif,colour214,default}]#[fg=#{?@claude_notif,black,default},bold] #I:#W#{?window_flags,#{window_flags}, }#{?@claude_notif,[!] ,}#[default]"

set -g @plugin 'tmux-plugins/tpm'

# Essential settings
set -g @plugin 'tmux-plugins/tmux-sensible'

# Restore tmux session
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Save session automaticlly
set -g @plugin 'tmux-plugins/tmux-continuum'

# auto start terminal on boot
set -g @continuum-boot 'on'

# auto restore tmux
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager.
# Keep this as the very last line: tpm sources each plugin at this point, and
# tmux-continuum reads the @continuum-* options above when it loads. Setting
# them after this line would leave auto-restore disabled.
run '~/.config/tmux/plugins/tpm/tpm'
