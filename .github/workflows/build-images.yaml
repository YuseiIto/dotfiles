name: Build OS Images

on:
  push:
    branches: [main]
    paths:
      - 'mkosi.**'
      - 'mitamae/**'
      - 'setup.sh'
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant to build (e.g. pine, bamboo)'
        required: true
        default: 'pine'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          # Install system dependencies (excluding mkosi)
          sudo apt-get install -y systemd-container xz-utils systemd-ukify systemd-boot
          # Install latest mkosi via uv
          uv tool install git+https://github.com/systemd/mkosi.git

      - name: Build OS Image with mkosi
        env:
          VARIANT: ${{ github.event.inputs.variant || 'pine' }}
        run: |
          # Use the full path of mkosi installed by uv
          sudo $(which mkosi) build --output=yuseiito-dev-live_${VARIANT}.raw

      - name: Compress Image
        env:
          VARIANT: ${{ github.event.inputs.variant || 'pine' }}
        run: |
          sudo xz -T0 -9 yuseiito-dev-live_${VARIANT}.raw

      - name: Upload Artifact
        env:
          VARIANT: ${{ github.event.inputs.variant || 'pine' }}
        uses: actions/upload-artifact@v4
        with:
          name: yuseiito-dev-live_${{ github.event.inputs.variant || 'pine' }}-raw
          path: yuseiito-dev-live_*.raw.xz
          retention-days: 90
