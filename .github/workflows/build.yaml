name: Build

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Docker 🐳 [${{ matrix.variant }}]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [pine, bamboo, plum, palm]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set lower username
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set Image name
        id: image_name
        run: echo "name=${{ steps.owner.outputs.name }}/${{ steps.owner.outputs.name }}-dev" >> $GITHUB_OUTPUT

      - name: Set up QEMU for multi-arch build
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short commit SHA
        id: vars
        if: github.ref == 'refs/heads/main'
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT


      # Replace slashes in branch name to hyphens to ensure valid Docker tag
      - name: Sanitize branch name
        id: branch_name
        if: github.ref != 'refs/heads/main'
        run: echo "branch=${GITHUB_REF_NAME//\//-}" >> $GITHUB_OUTPUT

      - name: Build test image (amd64 only)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.variant }}
          platforms: linux/amd64
          load: true
          push: false
          tags: test-${{ matrix.variant }}:local

      - name: Run goss validation
        run: |
          case "${{ matrix.variant }}" in
            plum) home="/home/debian" ;;
            *) home="/home/ubuntu" ;;
          esac
          docker run --rm test-${{ matrix.variant }}:local \
            goss --gossfile "${home}/dotfiles/mitamae/roles/${{ matrix.variant }}/goss.yaml" validate

      - name: Build and push (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.variant }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }}:${{ matrix.variant }}-latest
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }}:${{ matrix.variant }}-${{ steps.vars.outputs.sha_short }}

      - name: Build and push (branch)
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.variant }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }}:${{ matrix.variant }}-${{ steps.branch_name.outputs.branch }}


  lxc:
    name: LXC 🐧 [${{ matrix.variant }}]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [plum, bamboo, pine]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set image name
        id: image_name
        run: echo "name=${{ steps.owner.outputs.name }}/${{ steps.owner.outputs.name }}-dev-lxc" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools xz-utils systemd-container rsync

      - name: Set up oras
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2
        with:
          version: 1.2.0

      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short commit SHA
        id: vars
        if: github.ref == 'refs/heads/main'
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Sanitize branch name
        id: branch_name
        if: github.ref != 'refs/heads/main'
        run: echo "branch=${GITHUB_REF_NAME//\//-}" >> $GITHUB_OUTPUT

      - name: Build LXC image
        run: sudo scripts/build-lxc.sh ${{ matrix.variant }}

      - name: Push to GHCR (main)
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE_BASE="${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }}"
          VARIANT="${{ matrix.variant }}"
          SHA="${{ steps.vars.outputs.sha_short }}"

          oras push "${IMAGE_BASE}:${VARIANT}-latest" \
            "lxd-${VARIANT}.tar.xz:application/vnd.oci.image.layer.v1.tar+gzip" \
            "rootfs-${VARIANT}.squashfs:application/vnd.oci.image.layer.v1.tar+gzip"

          oras push "${IMAGE_BASE}:${VARIANT}-${SHA}" \
            "lxd-${VARIANT}.tar.xz:application/vnd.oci.image.layer.v1.tar+gzip" \
            "rootfs-${VARIANT}.squashfs:application/vnd.oci.image.layer.v1.tar+gzip"

      - name: Push to GHCR (branch)
        if: github.ref != 'refs/heads/main'
        run: |
          IMAGE_BASE="${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }}"
          VARIANT="${{ matrix.variant }}"
          BRANCH="${{ steps.branch_name.outputs.branch }}"

          oras push "${IMAGE_BASE}:${VARIANT}-${BRANCH}" \
            "lxd-${VARIANT}.tar.xz:application/vnd.oci.image.layer.v1.tar+gzip" \
            "rootfs-${VARIANT}.squashfs:application/vnd.oci.image.layer.v1.tar+gzip"
