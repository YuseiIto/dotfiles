name: Build

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  docker-build:
    name: Docker 🐳 [${{ matrix.variant }}/${{ matrix.arch }}]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        variant: [pine, bamboo, plum, palm]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set lower username
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set Image name
        id: image_name
        run: echo "name=${{ steps.owner.outputs.name }}/${{ steps.owner.outputs.name }}-dev" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }}
          flavor: |
            latest=false
            prefix=${{ matrix.variant }}-,onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.variant }}
          platforms: ${{ matrix.platform }}
          load: true
          push: false
          tags: test-${{ matrix.variant }}-${{ matrix.arch }}:local
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.arch }}

      - name: Run goss validation
        run: |
          case "${{ matrix.variant }}" in
            plum) home="/home/debian" ;;
            *) home="/home/ubuntu" ;;
          esac
          docker run --rm test-${{ matrix.variant }}-${{ matrix.arch }}:local \
            goss --gossfile "${home}/dotfiles/mitamae/roles/${{ matrix.variant }}/goss.yaml" validate

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.variant }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # oci-mediatypes=true ensures the per-arch images (and the index merged
          # from them) are OCI, so GHCR honors the index-level description
          # annotation set in docker-merge. Ref: docker/build-push-action#1022
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }},oci-mediatypes=true,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.variant }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Docker manifest 📦 [${{ matrix.variant }}]
    needs: docker-build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        variant: [pine, bamboo, plum, palm]
    steps:
      - name: Set lower username
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set Image name
        id: image_name
        run: echo "name=${{ steps.owner.outputs.name }}/${{ steps.owner.outputs.name }}-dev" >> $GITHUB_OUTPUT

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }}
          flavor: |
            latest=false
            prefix=${{ matrix.variant }}-,onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
        env:
          # Annotations attach to the manifest list assembled in this job; the
          # per-arch digest images carry OCI labels from the build job instead.
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }}
          METADATA_JSON: ${{ steps.meta.outputs.json }}
        run: |
          mapfile -t tags < <(jq -r '.tags[]' <<< "$METADATA_JSON")
          mapfile -t annotations < <(jq -r '.annotations[]' <<< "$METADATA_JSON")

          create_args=()
          for tag in "${tags[@]}"; do create_args+=(--tag "$tag"); done
          for annotation in "${annotations[@]}"; do create_args+=(--annotation "$annotation"); done
          for digest in *; do create_args+=("${IMAGE_REF}@sha256:${digest}"); done

          docker buildx imagetools create "${create_args[@]}"


  lxc:
    name: LXC 🐧 [${{ matrix.variant }}]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [plum, bamboo, pine]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set image name
        id: image_name
        run: echo "name=${{ steps.owner.outputs.name }}/${{ steps.owner.outputs.name }}-dev-lxc" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools xz-utils systemd-container rsync
          # Install oras
          ORAS_VERSION="1.2.0"
          curl -sLO "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          sudo tar -xzf "oras_${ORAS_VERSION}_linux_amd64.tar.gz" -C /usr/local/bin oras
          rm "oras_${ORAS_VERSION}_linux_amd64.tar.gz"

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short commit SHA
        id: vars
        if: github.ref == 'refs/heads/main'
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Sanitize branch name
        id: branch_name
        if: github.ref != 'refs/heads/main'
        run: echo "branch=${GITHUB_REF_NAME//\//-}" >> $GITHUB_OUTPUT

      - name: Build LXC image
        run: sudo scripts/build-lxc.sh ${{ matrix.variant }}

      - name: Push to GHCR (main)
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE_BASE="${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }}"
          VARIANT="${{ matrix.variant }}"
          SHA="${{ steps.vars.outputs.sha_short }}"

          oras push "${IMAGE_BASE}:${VARIANT}-latest" \
            "lxd-${VARIANT}.tar.xz:application/vnd.oci.image.layer.v1.tar+gzip" \
            "rootfs-${VARIANT}.squashfs:application/vnd.oci.image.layer.v1.tar+gzip"

          oras push "${IMAGE_BASE}:${VARIANT}-${SHA}" \
            "lxd-${VARIANT}.tar.xz:application/vnd.oci.image.layer.v1.tar+gzip" \
            "rootfs-${VARIANT}.squashfs:application/vnd.oci.image.layer.v1.tar+gzip"

      - name: Push to GHCR (branch)
        if: github.ref != 'refs/heads/main'
        run: |
          IMAGE_BASE="${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }}"
          VARIANT="${{ matrix.variant }}"
          BRANCH="${{ steps.branch_name.outputs.branch }}"

          oras push "${IMAGE_BASE}:${VARIANT}-${BRANCH}" \
            "lxd-${VARIANT}.tar.xz:application/vnd.oci.image.layer.v1.tar+gzip" \
            "rootfs-${VARIANT}.squashfs:application/vnd.oci.image.layer.v1.tar+gzip"
