name: macOS Roles Verification

on:
  push:

jobs:
  verify-macos-role:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        role: [belle]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Update Homebrew
        # workaround: macOS runners ship with a stale Homebrew tap, causing
        # 404 errors on casks whose upstream removed old versions (e.g. mactex).
        run: brew update

      - name: Run mitamae for role ${{ matrix.role }}
        env:
          DOTFILES_ROLE: ${{ matrix.role }}
        run: |
          ./setup.sh
