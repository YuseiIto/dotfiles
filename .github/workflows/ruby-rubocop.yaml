name: Check RuboCop
on:
  push:
  pull_request:

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: mitamae
      - name: Run RuboCop
        run: bundle exec rubocop
        working-directory: mitamae
