name: ShellCheck
on:
  push:
    paths: ['**.sh', 'mitamae/bin/**']
  pull_request:
    paths: ['**.sh', 'mitamae/bin/**']
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          additional_files: 'mitamae/bin/setup'
