name: Test

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  devcontainer:
      name: DevContainer
      runs-on: ubuntu-latest
      steps:
        - name: Checkout repository
          uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

        - name: Build and start Dev Container
          uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3
          with:
            # Beyond starting the container, verify the in-container rootless
            # Docker daemon (started by postStartCommand) actually works. The
            # check is skipped with a visible warning if the prebuilt image
            # does not ship the rootless tooling yet, so an image lagging one
            # rebuild behind does not fail the job.
            runCmd: |
              zsh -c "echo 'Dev container built and started successfully!'"
              if command -v dockerd-rootless.sh >/dev/null 2>&1; then
                docker run --rm hello-world
              else
                echo "::warning::rootless docker tooling not in the prebuilt image yet; smoke test skipped"
              fi

  macos-smoke:
      name: macOS [${{ matrix.role }}]
      runs-on: macos-latest
      strategy:
        fail-fast: false
        matrix:
          role: [belle, pc137, hercules]

      steps:
        - name: Checkout code
          uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

        - name: Free disk space
          run: |
            df -h /
            # Switch to CLI tools before removing Xcode apps
            sudo xcode-select -s /Library/Developer/CommandLineTools
            # Remove all Xcode app versions - ~38 GB
            sudo rm -rf /Applications/Xcode*.app
            # Remove Xcode simulator runtimes - ~51 GB
            sudo rm -rf /Library/Developer/CoreSimulator
            # Remove other Xcode developer files (keep CommandLineTools)
            sudo rm -rf /Library/Developer/DeveloperDiskImages
            sudo rm -rf /Library/Developer/CoreDevice
            sudo rm -rf /Library/Developer/PrivateFrameworks
            sudo rm -rf /Library/Developer/DeviceKit
            df -h /

        - name: Update Homebrew
          # workaround: macOS runners ship with a stale Homebrew tap, causing
          # 404 errors on casks whose upstream removed old versions (e.g. mactex).
          run: brew update

        - name: Run mitamae for role ${{ matrix.role }}
          env:
            DOTFILES_ROLE: ${{ matrix.role }}
          run: |
            ./setup.sh

        - name: Validate role ${{ matrix.role }} with goss
          env:
            GOSS_USE_ALPHA: 1
          run: |
            zsh -c "goss --gossfile mitamae/roles/${{ matrix.role }}/goss.yaml validate"
