name: Update lazy-lock.json

# Weekly refresh of the Neovim plugin lockfile. lazy.nvim resolves each plugin
# to its latest upstream commit and rewrites .config/nvim/lazy-lock.json; the
# diff (if any) is opened as a PR so the update is reviewed and CI-tested before
# it lands, rather than drifting silently on each machine's provisioning run.

on:
  schedule:
    # Mondays 00:00 UTC (09:00 JST). Keeps the review cadence predictable.
    - cron: "0 0 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-lockfile:
    name: Refresh lazy.nvim lockfile
    runs-on: ubuntu-latest
    # Bounded so a stuck plugin build (parser compilation, cargo build) can't
    # hold a runner indefinitely.
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # The provisioning cookbooks are the single source of truth for which
      # Neovim / tree-sitter versions the real machines run, so read the pins
      # from there instead of duplicating the numbers here.
      - name: Resolve pinned tool versions
        id: versions
        run: |
          nvim_version=$(sed -nE "s/^nvim_version = '([^']+)'.*/\1/p" mitamae/cookbooks/neovim/default.rb)
          ts_version=$(sed -nE "s/^tree_sitter_version = '([^']+)'.*/\1/p" mitamae/cookbooks/tree-sitter/default.rb)
          echo "nvim=$nvim_version" >> "$GITHUB_OUTPUT"
          echo "tree_sitter=$ts_version" >> "$GITHUB_OUTPUT"

      # tree-sitter's `build = ":TSUpdate"` compiles parsers during the update,
      # so the CLI must be present or those builds fail and abort the run.
      - name: Install tree-sitter CLI
        run: |
          curl -fsSL -o /tmp/tree-sitter.gz \
            "https://github.com/tree-sitter/tree-sitter/releases/download/v${{ steps.versions.outputs.tree_sitter }}/tree-sitter-linux-x64.gz"
          gunzip -f /tmp/tree-sitter.gz
          sudo install -m 0755 /tmp/tree-sitter /usr/local/bin/tree-sitter
          tree-sitter --version

      - name: Install Neovim
        run: |
          release="nvim-linux-x86_64"
          curl -fsSL -o /tmp/nvim.tar.gz \
            "https://github.com/neovim/neovim/releases/download/v${{ steps.versions.outputs.nvim }}/${release}.tar.gz"
          sudo tar -C /opt -xzf /tmp/nvim.tar.gz
          sudo ln -sf "/opt/${release}/bin/nvim" /usr/local/bin/nvim
          nvim --version | head -1

      # features.lua is normally rendered per-role by mitamae and is gitignored.
      # Enable every feature so the lockfile covers all plugins any role can pull
      # in, not just those active on one host.
      - name: Generate features.lua with all features enabled
        run: |
          cat > .config/nvim/lua/features.lua <<'EOF'
          local M = {}
          M.lsp = true
          M.lazygit = true
          M.ai = true
          M.rich_presence = true
          M.basic_amenities = true
          M.prisma_dev = true
          M.render_md = true
          return M
          EOF

      # Point Neovim at the in-repo config so lazy writes the lockfile back to
      # the tracked path. The `!` makes `:Lazy update` run synchronously, which
      # is required in headless mode; update (not sync) refreshes plugins and the
      # lockfile without cleaning plugins gated off in this run.
      - name: Update plugins and lockfile
        env:
          XDG_CONFIG_HOME: ${{ github.workspace }}/.config
        run: nvim --headless "+Lazy! update" +qa

      # Requires "Allow GitHub Actions to create and approve pull requests" to be
      # enabled in the repository/organization Actions settings; otherwise the
      # default GITHUB_TOKEN cannot open the PR.
      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: .config/nvim/lazy-lock.json
          branch: chore/update-lazy-lock
          delete-branch: true
          commit-message: "chore(nvim): update lazy.nvim plugin lockfile"
          title: "chore(nvim): update lazy.nvim plugin lockfile"
          body: |
            Automated weekly refresh of `.config/nvim/lazy-lock.json`.

            lazy.nvim resolved each plugin to its latest upstream commit. Review
            the diff and let CI run before merging.

            Generated by the `Update lazy-lock.json` workflow.
          labels: |
            dependencies
            automated
